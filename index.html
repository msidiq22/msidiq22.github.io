<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: sans-serif; margin: 20px; text-align: center; background: #f4f7f6; }
    .container { max-width: 400px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    video { width: 100%; border-radius: 10px; background: #000; margin-bottom: 10px; display: none; }
    input, select, button { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
    button { background: #28a745; color: white; font-weight: bold; border: none; cursor: pointer; }
    button:disabled { background: #ccc; }
    #btnKamera { background: #007bff; margin-bottom: 15px; }
    #status-msg { font-size: 0.9em; margin-top: 10px; font-weight: bold; }

    /* --- CSS UNTUK POPUP MODAL --- */
    .modal-overlay {
      display: none; /* Sembunyikan secara default */
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.6); 
      z-index: 1000; 
      justify-content: center; 
      align-items: center;
    }
    .modal-content {
      background: white; padding: 25px; border-radius: 15px; 
      text-align: center; max-width: 85%; width: 350px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }
    .modal-content h3 { margin-top: 0; color: #dc3545; }
    .modal-content p { font-size: 14px; color: #333; line-height: 1.5; text-align: left; }
    .btn-tutup { background: #dc3545; margin-top: 15px; }
  </style>
</head>
<body>
  
  <div id="kameraModal" class="modal-overlay">
    <div class="modal-content">
      <h3>🚨 Izin Kamera Ditolak</h3>
      <p>Browser memblokir akses kamera. Agar bisa absen, lakukan langkah berikut:</p>
      <p>
        1. Klik <b>ikon gembok 🔒</b> di sebelah kiri atas URL.<br>
        2. Cari tulisan Kamera, lalu ubah menjadi <b>Allow (Izinkan)</b>.<br>
        3. Klik tombol refresh (muat ulang) halaman ini.
      </p>
      <button class="btn-tutup" onclick="tutupModal()">Saya Mengerti</button>
    </div>
  </div>

  <div class="container">
    <h3>Presensi Selfie & GPS</h3>
    
    <button type="button" id="btnKamera" onclick="bukaKamera()">📷 Buka Kamera</button>
    
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas" style="display:none;"></canvas>
    
    <input type="text" id="nama" placeholder="Masukkan Nama Lengkap">
    <select id="status">
      <option value="Masuk">Masuk</option>
      <option value="Pulang">Pulang</option>
    </select>
    
    <button id="btnKirim" onclick="prosesPresensi()" disabled>Kirim Presensi</button>
    <div id="status-msg"></div>
  </div>
 
  <script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const btnKirim = document.getElementById('btnKirim');
    const btnKamera = document.getElementById('btnKamera');
    const msg = document.getElementById('status-msg');
    const modal = document.getElementById('kameraModal'); // Mengambil elemen modal
 
    const latKantor = -1.2118383114367253; 
    const lonKantor = 103.79415069372715;
    const radiusMaks = 100; 
 
    function bukaKamera() {
      msg.innerText = "Meminta izin kamera...";
      msg.style.color = "blue";

      navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
        .then(stream => {
          video.style.display = "block";
          video.srcObject = stream;
          btnKamera.style.display = "none"; 
          btnKirim.disabled = false; 
          msg.innerText = "Kamera aktif, siap presensi.";
          msg.style.color = "green";
        })
        .catch(err => {
          // JIKA ERROR / DITOLAK, TAMPILKAN POPUP KITA, BUKAN ALERT BAWAAN
          modal.style.display = "flex"; 
          msg.innerText = "Gagal mengakses kamera.";
          msg.style.color = "red";
        });
    }

    // Fungsi untuk menutup popup
    function tutupModal() {
      modal.style.display = "none";
    }
 
    function getDistance(lat1, lon1, lat2, lon2) {
      const R = 6371e3; 
      const φ1 = lat1 * Math.PI/180;
      const φ2 = lat2 * Math.PI/180;
      const Δφ = (lat2-lat1) * Math.PI/180;
      const Δλ = (lon2-lon1) * Math.PI/180;
      const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) + Math.cos(φ1) * Math.cos(φ2) * Math.sin(Δλ/2) * Math.sin(Δλ/2);
      return Math.round(R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
    }
 
    function prosesPresensi() {
      const nama = document.getElementById('nama').value;
      if(!nama) return alert("Isi nama dulu!");
 
      btnKirim.disabled = true;
      msg.innerText = "Mengecek Lokasi & Mengambil Foto...";
      msg.style.color = "blue";
 
      navigator.geolocation.getCurrentPosition((pos) => {
        const uLat = pos.coords.latitude;
        const uLon = pos.coords.longitude;
        const jarak = getDistance(uLat, uLon, latKantor, lonKantor);
 
        if(jarak > radiusMaks) {
          msg.innerText = `Gagal! Jarak Anda ${jarak}m dari kantor. (Maks 100m)`;
          msg.style.color = "red";
          btnKirim.disabled = false;
          return;
        }
 
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        const fotoData = canvas.toDataURL('image/jpeg');
 
        const payload = {
          nama: nama,
          status: document.getElementById('status').value,
          lat: uLat,
          lon: uLon,
          jarak: jarak,
          image: fotoData
        };
 
        google.script.run.withSuccessHandler((res) => {
          msg.innerText = res;
          msg.style.color = "green";
          btnKirim.disabled = false;
          document.getElementById('nama').value = "";
        }).withFailureHandler((err) => {
          msg.innerText = "Gagal menyimpan data.";
          msg.style.color = "red";
          btnKirim.disabled = false;
        }).simpanPresensi(payload);
 
      }, (err) => {
        msg.innerText = "Gagal mendapatkan GPS. Pastikan Izin Lokasi aktif!";
        msg.style.color = "red";
        btnKirim.disabled = false;
      }, { enableHighAccuracy: true });
    }
  </script>
</body>
</html>
